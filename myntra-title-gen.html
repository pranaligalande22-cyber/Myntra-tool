<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Myntra Deal Title Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF3F6C;
    --dark: #0D0D0D;
    --card: #161616;
    --border: #2a2a2a;
    --muted: #888;
    --white: #F5F5F5;
    --green: #00D26A;
    --yellow: #FFD600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  /* Header */
  .header {
    padding: 28px 0 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--pink);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--white), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header .sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-left: auto;
  }

  /* Input section */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .url-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: #0D0D0D;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }

  .url-input:focus { border-color: var(--pink); }
  .url-input::placeholder { color: #444; }

  .fetch-btn {
    background: var(--pink);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.3px;
  }

  .fetch-btn:active { transform: scale(0.96); background: #e03560; }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 32px 0;
  }

  .loading.show { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p { color: var(--muted); font-size: 13px; }

  /* Result */
  .result-card {
    display: none;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .result-card.show { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-meta {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .meta-row:last-child { border-bottom: none; padding-bottom: 0; }
  .meta-row:first-child { padding-top: 0; }

  .meta-key {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta-val {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    text-align: right;
    max-width: 60%;
    word-break: break-word;
  }

  .meta-val.price { color: var(--green); }
  .meta-val.discount { color: var(--yellow); }

  /* Title output */
  .title-card {
    background: linear-gradient(135deg, #1a0a0f, #160010);
    border: 1.5px solid rgba(255, 63, 108, 0.35);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .title-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(255,63,108,0.15), transparent 70%);
    pointer-events: none;
  }

  .title-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .title-label::before {
    content: '★';
    font-size: 10px;
  }

  .title-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--white);
    word-break: break-word;
  }

  .title-text .discount-highlight { color: var(--yellow); }
  .title-text .price-highlight { color: var(--green); }

  /* Action buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .action-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
  }

  .action-btn:active { transform: scale(0.96); }

  .action-btn.copy-title { border-color: rgba(255,63,108,0.4); }
  .action-btn.copy-title:active { background: rgba(255,63,108,0.1); }

  .action-btn.copy-link { border-color: rgba(0,210,106,0.4); }
  .action-btn.copy-link:active { background: rgba(0,210,106,0.1); }

  .action-btn.open-link {
    grid-column: 1 / -1;
    border-color: rgba(255,214,0,0.3);
    color: var(--yellow);
  }

  .action-btn.open-link:active { background: rgba(255,214,0,0.05); }

  .icon { font-size: 16px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Error */
  .error-card {
    display: none;
    background: rgba(255,63,108,0.06);
    border: 1.5px solid rgba(255,63,108,0.25);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    animation: slideUp 0.3s ease;
  }

  .error-card.show { display: block; }

  .error-card p {
    font-size: 13px;
    color: #ff7a99;
    line-height: 1.5;
  }

  .error-card strong {
    display: block;
    color: var(--pink);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Tips */
  .tip {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin-top: 20px;
    line-height: 1.7;
  }

  .tip span { color: #666; }

  /* Reset btn */
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    display: block;
    margin: 0 auto;
    transition: all 0.2s;
  }

  .reset-btn:active { border-color: var(--pink); color: var(--pink); }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo-dot"></div>
    <h1>MYNTRA DEAL</h1>
    <span class="sub">Title Gen</span>
  </div>

  <div class="input-card">
    <div class="input-label">Paste Myntra Product URL</div>
    <div class="url-row">
      <input
        class="url-input"
        id="urlInput"
        type="url"
        placeholder="https://www.myntra.com/..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />
      <button class="fetch-btn" id="fetchBtn" onclick="fetchProduct()">
        <span id="btnIcon">⚡</span>
        <span id="btnText">Fetch</span>
      </button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">Fetching product details...</p>
  </div>

  <div class="error-card" id="errorCard">
    <strong>⚠ Error</strong>
    <p id="errorMsg"></p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="product-meta" id="productMeta"></div>

    <div class="title-card">
      <div class="title-label">Generated Deal Title</div>
      <div class="title-text" id="titleText"></div>
    </div>

    <div class="actions">
      <button class="action-btn copy-title" onclick="copyTitle()">
        <span class="icon">📋</span> Copy Title
      </button>
      <button class="action-btn copy-link" onclick="copyLink()">
        <span class="icon">🔗</span> Copy Link
      </button>
      <a class="action-btn open-link" id="openLinkBtn" href="#" target="_blank" rel="noopener">
        <span class="icon">🛍</span> Open on Myntra
      </a>
    </div>

    <button class="reset-btn" onclick="reset()">↺ Try another product</button>
  </div>

  <p class="tip">Paste any Myntra product URL above.<br><span>Works with clothing, shoes, accessories & more.</span></p>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentUrl = '';
  let currentTitle = '';

  const loadingMsgs = [
    "Fetching product details...",
    "Reading price & discount...",
    "Crafting your deal title...",
  ];

  async function fetchProduct() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showToast('Please paste a Myntra URL first'); return; }
    if (!url.includes('myntra.com')) { showError('Please enter a valid Myntra product URL (e.g. https://www.myntra.com/...)'); return; }

    currentUrl = url;
    setLoading(true);
    hideAll();

    // Cycle loading messages
    let msgIdx = 0;
    const msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % loadingMsgs.length;
      document.getElementById('loadingMsg').textContent = loadingMsgs[msgIdx];
    }, 1800);

    try {
      const result = await callClaudeAPI(url);
      clearInterval(msgInterval);
      if (result.error) {
        showError(result.error);
      } else {
        showResult(result);
      }
    } catch (e) {
      clearInterval(msgInterval);
      showError('Something went wrong. Please check your internet connection and try again.');
    } finally {
      setLoading(false);
    }
  }

  async function callClaudeAPI(url) {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        system: `You are a product data extractor. When given a Myntra product URL, use web search to find the product page and extract:
1. Product name/title
2. Current selling price (in ₹)
3. Original MRP price (in ₹)
4. Discount percentage

Respond ONLY with a valid JSON object, no markdown, no extra text:
{
  "name": "Full product name",
  "price": "₹999",
  "mrp": "₹1999",
  "discount": "50% off",
  "found": true
}

If you cannot find the product, respond with:
{"found": false, "error": "Brief reason why"}

Rules:
- Extract exact price shown on the page
- Discount should be "X% off" format
- Product name should be descriptive (brand + type)`,
        messages: [{ role: "user", content: `Extract product details from this Myntra URL: ${url}` }]
      })
    });

    if (!response.ok) throw new Error('API error: ' + response.status);

    const data = await response.json();
    const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
    const clean = text.replace(/```json|```/g, '').trim();

    try {
      const parsed = JSON.parse(clean);
      if (!parsed.found) return { error: parsed.error || 'Product details could not be found for this URL.' };
      return parsed;
    } catch {
      // Try extracting JSON from partial text
      const match = clean.match(/\{[\s\S]*\}/);
      if (match) {
        try {
          const parsed2 = JSON.parse(match[0]);
          if (!parsed2.found) return { error: parsed2.error || 'Product not found.' };
          return parsed2;
        } catch {}
      }
      return { error: 'Could not parse product data. Try a different Myntra URL.' };
    }
  }

  function showResult(data) {
    // Build meta rows
    const metaHtml = `
      <div class="meta-row">
        <span class="meta-key">Product</span>
        <span class="meta-val">${escHtml(data.name)}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Price</span>
        <span class="meta-val price">${escHtml(data.price)}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">MRP</span>
        <span class="meta-val">${escHtml(data.mrp || 'N/A')}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Discount</span>
        <span class="meta-val discount">${escHtml(data.discount)}</span>
      </div>
    `;
    document.getElementById('productMeta').innerHTML = metaHtml;

    // Build title — format: DISCOUNT on PRODUCT NAME at just PRICE
    const titlePlain = `${data.discount} on ${data.name} at just ${data.price}`;
    currentTitle = titlePlain;

    const titleHtml = `<span class="discount-highlight">${escHtml(data.discount)}</span> on ${escHtml(data.name)} at just <span class="price-highlight">${escHtml(data.price)}</span>`;
    document.getElementById('titleText').innerHTML = titleHtml;

    document.getElementById('openLinkBtn').href = currentUrl;

    document.getElementById('resultCard').classList.add('show');
  }

  function copyTitle() {
    if (!currentTitle) return;
    navigator.clipboard.writeText(currentTitle).then(() => {
      showToast('✓ Title copied!');
    }).catch(() => fallbackCopy(currentTitle, 'Title copied!'));
  }

  function copyLink() {
    if (!currentUrl) return;
    navigator.clipboard.writeText(currentUrl).then(() => {
      showToast('✓ Link copied!');
    }).catch(() => fallbackCopy(currentUrl, 'Link copied!'));
  }

  function fallbackCopy(text, msg) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ ' + msg);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorCard').classList.add('show');
  }

  function hideAll() {
    document.getElementById('errorCard').classList.remove('show');
    document.getElementById('resultCard').classList.remove('show');
  }

  function setLoading(on) {
    document.getElementById('loading').classList.toggle('show', on);
    document.getElementById('fetchBtn').disabled = on;
    document.getElementById('btnIcon').textContent = on ? '⏳' : '⚡';
    document.getElementById('btnText').textContent = on ? '' : 'Fetch';
  }

  function reset() {
    hideAll();
    document.getElementById('urlInput').value = '';
    currentUrl = '';
    currentTitle = '';
    document.getElementById('urlInput').focus();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Allow Enter key to trigger fetch
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchProduct();
  });
</script>
</body>
</html>
